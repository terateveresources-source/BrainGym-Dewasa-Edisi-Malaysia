<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainGym Keluarga Jauh - Online Multiplayer</title>
    <!-- Guna Supabase CDN untuk sambungan internet real-time -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1e293b;
            padding: 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            color: #4f46e5;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .hidden { display: none !important; }

        input, button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 1rem;
            font-weight: 600;
        }

        button {
            background: #4f46e5;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
        }

        button:hover { background: #4338ca; }

        .player-list {
            margin: 1rem 0;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 12px;
        }

        .player-badge {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            padding: 4px 12px;
            border-radius: 999px;
            margin: 4px;
            font-size: 14px;
            font-weight: 700;
        }

        .question-box {
            background: #fef3c7;
            padding: 1.5rem;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid #f59e0b;
        }

        .opt-btn {
            background: white;
            color: #334155;
            border: 2px solid #e2e8f0;
            text-align: left;
            margin-top: 0.5rem;
        }
        .opt-btn:hover { background: #f8fafc; color: #334155; }
        
        .opt-btn.selected {
            background: #e0e7ff;
            border-color: #4f46e5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍👩‍👧‍👦 BrainGym Jarak Jauh</h1>

    <!-- SKRIN LOG MASUK & BILIK -->
    <div id="screen-lobby">
        <p style="text-align: center; color: #64748b; margin-bottom: 1rem;">Meskipun abang di KL, adik di Johor & ayah di mamak, kita tetap satu meja!</p>
        
        <input type="text" id="input-room" placeholder="Masukkan Kod Bilik Contoh: KELUARGAKU">
        <input type="text" id="input-name" placeholder="Nama Anda (cth: Ayah / Adik)">
        <button onclick="joinRoom()">Masuk Bilik Sembang & Main</button>

        <div id="area-waiting" class="hidden">
            <h3 style="margin-top: 1.5rem;">Ahli yang dah masuk:</h3>
            <div class="player-list" id="lobby-players"></div>
            <button id="btn-start-game" onclick="hostStartGame()" style="background: #10b981;">Mula Permainan (Ketua Sahaja)</button>
        </div>
    </div>

    <!-- SKRIN PERMAINAN REAL-TIME -->
    <div id="screen-game" class="hidden">
        <div style="display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 0.5rem;">
            <span id="txt-room-id">Bilik: -</span>
            <span id="txt-timer">Masa: 20s</span>
        </div>
        
        <div class="question-box" id="display-question">Memuatkan soalan dari server...</div>
        <div id="options-area"></div>
        
        <p style="text-align: center; margin-top: 1rem; font-size: 13px; color: #94a3b8;" id="txt-status-submit">Sila pilih satu jawapan...</p>
    </div>

    <!-- SKRIN LEADERBOARD TERKUMPUL -->
    <div id="screen-results" class="hidden" style="text-align: center;">
        <h2>🏆 Keputusan Akhir Keluarga</h2>
        <div class="player-list" id="leaderboard-output" style="text-align: left; margin-top: 1rem;"></div>
        <button onclick="location.reload()">Main Semula</button>
    </div>
</div>

<script>
    // --- PANDUAN CONFIGURATION SUPABASE ---
    // 1. Daftar akaun percuma di https://supabase.com
    // 2. Buat projek baru, pergi ke Project Settings -> API.
    // 3. Salin URL dan Anon Key anda, tampal di bawah:
    const SUPABASE_URL = "https://zlqxctzryejevctyhtbb.supabase.co/rest/v1/"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpscXhjdHpyeWVqZXZjdHlodGJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTg4MjcsImV4cCI6MjA5ODk5NDgyN30.EWo4qfDyyeyC4b4Xd6e2HPBop_65-lI0lF-mf4HcaAI";
    
    let supabase = null;
    if(SUPABASE_URL !== "https://YOUR_PROJECT_ID.supabase.co") {
        supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    let myName = "";
    let roomId = "";
    let currentQuestionIdx = 0;
    let myScore = 0;

    const bankSoalan = [
        { q: "Pakcik Rahman memandu Myvi bersama 3 anaknya. Di Plaza Tol Gombak, dia membayar tol. Tangan siapakah yang keluar dari tingkap?", o: ["Tangan Pakcik Rahman", "Anak sulung", "Anak bongsu", "Tangan orang lain"], a: 0 },
        { q: "Apakah panggilan mesra paling popular untuk pekerja di kedai makan mamak?", o: ["Boss / Ane", "Tuan Pengarah", "Abang Sayang", "Encik Steward"], a: 0 }
    ];

    async function joinRoom() {
        if(!supabase) {
            alert("Sila masukkan SUPABASE_URL & SUPABASE_KEY anda di dalam kod terlebih dahulu untuk fungsi online!");
            return;
        }
        roomId = document.getElementById('input-room').value.trim().toUpperCase();
        myName = document.getElementById('input-name').value.trim();

        if(!roomId || !myName) {
            alert("Sila isi kod bilik dan nama anda!");
            return;
        }

        document.getElementById('area-waiting').classList.remove('hidden');
        
        // Simpan data kehadiran ke server database
        await supabase.from('room_players').insert([{ room_id: roomId, player_name: myName, score: 0 }]);

        // Dengar perubahan database secara Real-Time (Jika ada adik/abang masuk, nama auto-kemas kini!)
        supabase.channel(`room:${roomId}`)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'room_players', filter: `room_id=eq.${roomId}` }, payload => {
                updateLobbyList();
            })
            .on('broadcast', { event: 'start-game' }, () => {
                goToGame();
            })
            .subscribe();

        updateLobbyList();
    }

    async function updateLobbyList() {
        const { data } = await supabase.from('room_players').select('player_name').eq('room_id', roomId);
        const container = document.getElementById('lobby-players');
        container.innerHTML = '';
        if(data) {
            data.forEach(p => {
                container.innerHTML += `<span class="player-badge">👤 ${p.player_name}</span>`;
            });
        }
    }

    async function hostStartGame() {
        // Hantar isyarat "Mula" kepada semua ahli keluarga serentak via Broadcast
        await supabase.channel(`room:${roomId}`).send({
            type: 'broadcast',
            event: 'start-game'
        });
        goToGame();
    }

    function goToGame() {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('txt-room-id').innerText = `Bilik: ${roomId}`;
        loadQuestion();
    }

    function loadQuestion() {
        if(currentQuestionIdx >= bankSoalan.length) {
            showFinalResults();
            return;
        }
        const qData = bankSoalan[currentQuestionIdx];
        document.getElementById('display-question').innerText = qData.q;
        
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        
        qData.o.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => submitAnswer(idx, qData.a);
            area.appendChild(btn);
        });
        document.getElementById('txt-status-submit').innerText = "Sila pilih jawapan...";
    }

    async function submitAnswer(selectedIdx, correctIdx) {
        // Matikan butang pilihan lepas klik
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach(b => b.disabled = true);
        buttons[selectedIdx].classList.add('selected');

        if(selectedIdx === correctIdx) {
            myScore += 20;
            document.getElementById('txt-status-submit').innerText = "Jawapan anda disimpan! (Betul +20)";
            // Kemas kini markah anda ke server secara senyap
            await supabase.from('room_players').update({ score: myScore }).eq('room_id', roomId).eq('player_name', myName);
        } else {
            document.getElementById('txt-status-submit').innerText = "Jawapan anda disimpan! (Salah)";
        }

        // Tunggu 4 saat, kemudian bawa semua ke soalan seterusnya
        setTimeout(() => {
            currentQuestionIdx++;
            loadQuestion();
        }, 4000);
    }

    async function showFinalResults() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-results').classList.remove('hidden');

        // Tarik markah semua orang daripada database untuk buat perbandingan
        const { data } = await supabase.from('room_players').select('player_name, score').eq('room_id', roomId).order('score', { ascending: false });
        
        const output = document.getElementById('leaderboard-output');
        output.innerHTML = '';
        if(data) {
            data.forEach((p, idx) => {
                output.innerHTML += `<div><strong>#${idx+1} ${p.player_name}</strong>: ${p.score} Mata</div>`;
            });
        }
    }
</script>
</body>
</html>
