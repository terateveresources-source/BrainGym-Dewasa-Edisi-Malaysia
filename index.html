<head>

    <style>
        :root {
            --primary-yellow: #FFD166;
            --chili-red: #EF476F;
            --electric-blue: #118AB2;
            --jungle-green: #06D6A0;
            --dark-navy: #073B4C;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, var(--primary-yellow), var(--chili-red));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 0px var(--dark-navy);
            border: 4px solid var(--dark-navy);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge {
            background: var(--dark-navy);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
        }

        .category-tag {
            background: var(--electric-blue);
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h2 {
            color: var(--dark-navy);
            font-size: 22px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-option {
            background: white;
            border: 3px solid var(--dark-navy);
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            color: var(--dark-navy);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            box-shadow: 0 5px 0 var(--dark-navy);
        }

        .btn-option:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 var(--dark-navy);
            background: #f0f0f0;
        }

        .btn-option:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 var(--dark-navy);
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 15px;
            border-radius: 50px;
            border: 2px solid var(--dark-navy);
            overflow: hidden;
        }

        .progress-bar {
            background: var(--jungle-green);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-screen {
            display: none;
        }

        .score-screen h1 {
            font-size: 40px;
            color: var(--chili-red);
            margin-bottom: 10px;
        }

        .btn-next {
            background: var(--jungle-green);
            color: var(--dark-navy);
            border: 3px solid var(--dark-navy);
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--dark-navy);
            margin-top: 20px;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 var(--dark-navy);
        }
    </style>
</head>

    let poolSoalan = [...databaseSoalan];
    let setSoalanSemasa = [];
    let indeksSoalanSemasa = 0;
    let skor = 0;
    const TOTAL_SOALAN_PER_SET = Math.min(20, databaseSoalan.length); // Laras automatik mengikut jumlah data yang ada

    function mulakanSetBaharu() {
        setSoalanSemasa = [];
        // Mengambil soalan secara rawak tanpa ulangan daripada baki poolSoalan
        for(let i = 0; i < TOTAL_SOALAN_PER_SET; i++) {
            if(poolSoalan.length === 0) {
                poolSoalan = [...databaseSoalan]; // Reset pool kalau 3,000 soalan dah habis digunakan
            }
            const indeksRawak = Math.floor(Math.random() * poolSoalan.length);
            setSoalanSemasa.push(poolSoalan[indeksRawak]);
            poolSoalan.splice(indeksRawak, 1); // Buang soalan ini supaya 100% anti-ulang
        }
        indeksSoalanSemasa = 0;
        skor = 0;
        paparkanSoalan();
    }

    function paparkanSoalan() {
        if(indeksSoalanSemasa >= TOTAL_SOALAN_PER_SET) {
            tamatKuiz();
            return;
        }

        document.getElementById("quiz-screen").style.display = "block";
        document.getElementById("score-screen").style.display = "none";

        const dataSemasa = setSoalanSemasa[indeksSoalanSemasa];
        document.getElementById("question-number").innerText = `Soalan ${indeksSoalanSemasa + 1}/${TOTAL_SOALAN_PER_SET}`;
        document.getElementById("score-badge").innerText = `Skor: ${skor}`;
        document.getElementById("category").innerText = dataSemasa.kategori;
        document.getElementById("question-text").innerText = dataSemasa.soalan;

        // Progress Bar
        const peratusProgress = ((indeksSoalanSemasa) / TOTAL_SOALAN_PER_SET) * 100;
        document.getElementById("progress").style.width = peratusProgress + "%";

        // Pilihan Jawapan
        const containerPilihan = document.getElementById("options-container");
        containerPilihan.innerHTML = "";
        dataSemasa.pilihan.forEach((teks, indeks) => {
            const butang = document.createElement("button");
            butang.className = "btn-option";
            butang.innerText = `${String.fromCharCode(65 + indeks)}. ${teks}`;
            butang.onclick = () => semakJawapan(indeks);
            containerPilihan.appendChild(butang);
        });
    }

    function semakJawapan(indeksDipilih) {
        const jawapanBetul = setSoalanSemasa[indeksSoalanSemasa].jawapan;
        if(indeksDipilih === jawapanBetul) {
            skor++;
            alert("Betul! Otak korang memang cerdas cenggini 👍");
        } else {
            alert(`Aduhai, salah! Jawapan betul ialah: ${setSoalanSemasa[indeksSoalanSemasa].pilihan[jawapanBetul]}`);
        }
        indeksSoalanSemasa++;
        paparkanSoalan();
    }

    function tamatKuiz() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("score-screen").style.display = "block";
        document.getElementById("final-score").innerText = `Skor Anda: ${skor}/${TOTAL_SOALAN_PER_SET}`;
        
        // Penarafan Jati Diri Juru Bina Otak Malaysia
        let pangkat = "";
        if(skor === TOTAL_SOALAN_PER_SET) pangkat = "Pangkat: Sang Kancil Terpaling Genius 🏆";
        else if(skor > TOTAL_SOALAN_PER_SET * 0.7) pangkat = "Pangkat: Abang Long Kawasan Bertenaga ⚡";
        else if(skor > TOTAL_SOALAN_PER_SET * 0.4) pangkat = "Pangkat: Geng Kedai Kopi Santai ☕";
        else pangkat = "Pangkat: Budak Kampung Baru Belajar 👶";
        
        document.getElementById("rank-text").innerText = pangkat;
    }

    function restartQuiz() {
        mulakanSetBaharu();
    }

    // Auto-mula bila buka apps
    mulakanSetBaharu();
