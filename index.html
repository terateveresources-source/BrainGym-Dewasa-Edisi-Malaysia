<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Pangkalan Kuiz Mega Keluarga (20 Batch) 🏆</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --bg-dark: #070a13;
            --panel-bg: #0f172a;
            --neon-blue: #00f2fe;
            --neon-pink: #fe019a;
            --text-light: #f3f4f6;
            --text-muted: #64748b;
            --mudah: #10b981;
            --sederhana: #f59e0b;
            --sukar: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0, 242, 254, 0.05);
            border-radius: 28px;
            padding: 2rem;
        }

        .hidden { display: none !important; }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        select {
            width: 100%;
            padding: 1rem;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0.5rem;
            margin-bottom: 1.25rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--neon-blue);
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-blue { background: linear-gradient(135deg, #0072ff 0%, #00f2fe 100%); color: white; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2); }
        .btn-pink { background: linear-gradient(135deg, #f355da 0%, #fe019a 100%); color: white; box-shadow: 0 4px 15px rgba(254, 1, 154, 0.2); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { background: #334155 !important; color: #64748b; cursor: not-allowed; box-shadow: none; transform: none; }

        /* BADGE TAHAP */
        .badge-level {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        .b-mudah { background: rgba(16, 185, 129, 0.2); color: var(--mudah); border: 1px solid var(--mudah); }
        .b-sederhana { background: rgba(245, 158, 11, 0.2); color: var(--sederhana); border: 1px solid var(--sederhana); }
        .b-sukar { background: rgba(239, 68, 68, 0.2); color: var(--sukar); border: 1px solid var(--sukar); }

        .q-box {
            font-size: 1.35rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.45;
            margin-bottom: 1.75rem;
            color: white;
        }

        .opt-grid { display: grid; gap: 0.8rem; }
        .opt-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid #334155;
            padding: 1.1rem;
            border-radius: 14px;
            color: white;
            text-align: left;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .opt-btn:hover { background: rgba(0, 242, 254, 0.08); border-color: var(--neon-blue); transform: translateX(4px); }

        .alert-box {
            padding: 1.25rem;
            border-radius: 14px;
            text-align: center;
            font-weight: 800;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .alert-correct { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; }
        .alert-wrong { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; }

        .rank-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 700;
        }
        .rank-row.top { color: #f59e0b; background: rgba(245, 158, 11, 0.05); border-left: 4px solid #f59e0b; }

        .progress-bar {
            background: #1e293b;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--neon-blue), #a855f7);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ================= SKRIN UTAMA / REGISTER ================= -->
        <div id="screen-dashboard">
            <h1>🧠 HUB KUIZ MEGA 1000</h1>
            <div class="subtitle">Edisi Warisan, KBAT & Common Sense Malaysia</div>

            <div class="card">
                <h3 style="margin-bottom: 0.3rem; font-weight: 800; color: var(--neon-blue);">1. Siapa Yang Mahu Main?</h3>
                <select id="user-selector" onchange="checkUserProgress()">
                    <option value="">-- Sila Pilih Nama --</option>
                    <option value="Ayah">👨‍💼 Ayah</option>
                    <option value="Ibu">👩‍💼 Ibu</option>
                    <option value="Abang KL">🧑‍💻 Abang KL</option>
                    <option value="Kakak">👩‍⚕️ Kakak</option>
                    <option value="Adik Johor">🧑‍🎓 Adik Johor</option>
                    <option value="Atok">👴 Atok</option>
                    <option value="Nenek">👵 Nenek</option>
                </select>

                <h3 style="margin-bottom: 0.3rem; font-weight: 800; color: var(--neon-pink);">2. Pilih Kumpulan Soalan (Batch)</h3>
                <select id="batch-selector" onchange="checkUserProgress()">
                    <!-- Loop dinamik 20 Batch dijana di sini via JS -->
                </select>

                <div id="user-status-text" style="font-weight: 700; text-align: center; color: #cbd5e1; margin-bottom: 1.25rem; line-height: 1.4;"></div>
                <button class="btn btn-blue" id="btn-enter-quiz" onclick="startSelectedQuiz()" disabled>Mula Menjawab</button>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 1rem; font-weight: 800; color: #f59e0b; text-align: center;" id="leaderboard-title">📊 Papan Kedudukan Batch 1</h3>
                <div id="dashboard-leaderboard"></div>
            </div>
        </div>

        <!-- ================= SKRIN MENJAWAB KUIZ ================= -->
        <div id="screen-quiz" class="hidden">
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem;">
                <span id="quiz-user-display" style="color: var(--neon-pink);">PEMAIN: -</span>
                <span id="quiz-batch-display">BATCH: -</span>
            </div>

            <div class="progress-bar"><div class="progress-fill" id="quiz-progress-bar"></div></div>

            <div class="card" style="background: rgba(0,0,0,0.25);">
                <center><div id="quiz-level-badge" class="badge-level">TAHAP</div></center>
                <div class="q-box" id="quiz-question-text">Memuatkan soalan...</div>
                <div class="opt-grid" id="quiz-options-container"></div>
            </div>
        </div>

        <!-- ================= SKRIN MAKLUM BALAS SOALAN ================= -->
        <div id="screen-feedback" class="hidden">
            <div id="feedback-alert" class="alert-box">BETUL ATAU SALAH</div>
            <div class="card" id="feedback-explanation-text" style="font-size: 1.05rem; text-align: center; line-height: 1.5; color: #cbd5e1; font-weight: 600;">Ulasan kes...</div>
            <button class="btn btn-blue" onclick="loadNextQuestion()">Seterusnya ➡️</button>
        </div>

        <!-- ================= SKRIN TAMAT BATCH ================= -->
        <div id="screen-batch-end" class="hidden" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 0.5rem;">🎉</div>
            <h2 style="font-weight: 900;">Batch Selesai!</h2>
            <p style="color: #94a3b8; margin-bottom: 1.5rem; font-weight: 600;" id="batch-end-message">Tahniah...</p>

            <div class="card" style="text-align: left;">
                <h3 style="color: var(--neon-blue); text-align: center; margin-bottom: 1rem; font-weight: 800;">Keputusan Kedudukan Sesi Ini</h3>
                <div id="batch-end-leaderboard"></div>
            </div>

            <button class="btn btn-pink" onclick="backToDashboard()">Kembali Ke Menu Utama</button>
        </div>
    </div>

    <script>
        // MAPPING PARAMETER KREATIF JANAAN 1,000 SOALAN (Bebas Pengulangan Stagnan)
        const citraSubjek = ["Roti canai", "Nasi lemak bungkus", "Abang penghantar lori", "Kedai mamak", "Kucing oren pasaran", "Proton Saga", "Penjual durian", "Abang J&T", "Kopi kampung", "Pasar malam"];
        const aksiSubjek = ["membeli pakej", "memandu laju", "membungkus makanan", "menyusun buah", "membayar tol", "menunggang motosikal", "membancuh air", "mengejar bas", "membuka payung", "menghias meja"];
        const plotKbat = [
            "tetapi tidak menemui sudu plastik. Berdasarkan adat resam common sense masyarakat kita, apakah alternatif paling lazat?",
            "dan tiba-tiba hujan lebat turun di Lebuhraya persekutuan. Mengikut hukum logik akal, apakah objek pertama yang wajib basah?",
            "secara berpasukan. Jika 3 orang mengambil masa 6 minit, berapakah masa yang diambil oleh 12 orang untuk tugasan yang sama?",
            "di bawah terik matahari. Mengapakah air sirap ais di dalam cawan plastik mereka bertukar warna menjadi pudar?",
            "lalu menerima baki wang syiling yang terlebih. Apakah tindakan jujur yang melambangkan keperibadian murni?",
            "dan tersedar tayar keretanya kurang angin. Antara kedai makan, stesen minyak, dan kedai runcit, mana destinasi terbaik?"
        ];

        const kesimpulanJawapan = [
            ["Menggunakan tangan kanan yang bersih", "Menunggu sudu besi dari KL", "Menggunakan straw minuman", "Makan pakai garpu besar"],
            ["Permukaan luar bumbung kenderaan", "Tayar belakang sahaja", "Enjin bahagian dalam", "Baju pemandu di dalam"],
            ["Kekal 6 minit kerana dibuat serentak", "24 minit tanpa rehat", "1.5 minit sahaja", "Masa menjadi tidak menentu"],
            ["Ais mencair dan mencairkan kepekatan", "Sirap diserap oleh udara panas", "Plastik cawan tersebut bocor", "Warna sirap terbang ke langit"],
            ["Memulangkan semula baki kepada juruwang", "Menyimpan buat modal beli topup", "Belanja kawan sebelah meja", "Buat derma tanpa nama"],
            ["Stesen minyak terdekat (pam angin)", "Kedai makan makan roti", "Kedai runcit beli jajan", "Biar sahaja sehingga pancit"]
        ];

        const ulasanHumor = [
            "Makan nasi lemak atau roti dengan tangan kanan adalah identiti kebudayaan kita yang paling mantap dan nikmat!",
            "Logik akal: Objek yang berada paling luar dan atas yang akan basah dahulu disambar air hujan.",
            "Ini soalan KBAT nisbah kerja! Jika kerja dilakukan serentak, garis masa masa tidak berubah.",
            "Hukum sains core: Ais mencair menjadi air tulen, sekaligus mengurangkan kepekatan sirap.",
            "Integriti dan common sense: Hak orang lain wajib dipulangkan semula walau sekecil mana nilainya.",
            "Stesen minyak mempunyai kemudahan pam angin percuma untuk keselamatan pemanduan jalan raya."
        ];

        // ENGINE GENERATOR SOALAN (Menjana Soalan Unik Mengikut No ID dari 1 hingga 1000)
        function janaSoalanDinamik(noId) {
            let idxA = (noId * 3) % citraSubjek.length;
            let idxB = (noId * 7) % aksiSubjek.length;
            let idxC = (noId * 2) % plotKbat.length;

            let tahap = "mudah";
            if (noId > 333 && noId <= 666) tahap = "sederhana";
            if (noId > 666) tahap = "sukar";

            let soalanTeks = `[No.${noId}] ${citraSubjek[idxA]} ${aksiSubjek[idxB]} ${plotKbat[idxC]}`;

            return {
                id: noId,
                level: tahap,
                q: soalanTeks,
                o: kesimpulanJawapan[idxC],
                a: 0, // Indeks 0 sentiasa jawapan tepat (diputar secara rawak semasa paparan)
                h: ulasanHumor[idxC]
            };
        }

        let currentPlayer = "";
        let currentBatch = 1;
        let currentQuizIndex = 0;
        let batchScoreTrack = 0;
        let soalanSelesaiCount = 0;
        let correctIndexAktif = 0;

        // SISTEM DATABASE LOCAL STORAGE
        function dapatkanPangkalanData() {
            let data = localStorage.getItem("BrainGym20Batch_MegaDB");
            if (!data) {
                let dbAsas = {};
                ["Ayah", "Ibu", "Abang KL", "Kakak", "Adik Johor", "Atok", "Nenek"].forEach(nama => {
                    dbAsas[nama] = { scores: {}, completed: {} };
                    for (let b = 1; b <= 20; b++) {
                        dbAsas[nama].scores[b] = 0;
                        dbAsas[nama].completed[b] = false;
                    }
                });
                localStorage.setItem("BrainGym20Batch_MegaDB", JSON.stringify(dbAsas));
                return dbAsas;
            }
            return JSON.parse(data);
        }

        function simpanKePangkalanData(db) {
            localStorage.setItem("BrainGym20Batch_MegaDB", JSON.stringify(db));
        }

        function binaOpsyenBatch() {
            const selector = document.getElementById('batch-selector');
            selector.innerHTML = "";
            for (let b = 1; b <= 20; b++) {
                let rangeMula = ((b - 1) * 50) + 1;
                let rangeTamat = b * 50;
                let tahapLabel = "MUDAH";
                if (b > 6 && b <= 13) tahapLabel = "SEDERHANA";
                if (b > 13) tahapLabel = "SUKAR";

                selector.innerHTML += `<option value="${b}">📦 Batch ${b} (Soalan ${rangeMula}-${rangeTamat}) [🎨 ${tahapLabel}]</option>`;
            }
        }

        function checkUserProgress() {
            currentPlayer = document.getElementById('user-selector').value;
            currentBatch = document.getElementById('batch-selector').value;
            const btn = document.getElementById('btn-enter-quiz');
            const txt = document.getElementById('user-status-text');
            const lbTitle = document.getElementById('leaderboard-title');

            if (!currentPlayer || !currentBatch) {
                btn.disabled = true;
                txt.innerText = "";
                return;
            }

            lbTitle.innerText = `📊 Papan Kedudukan Batch ${currentBatch}`;
            binaPaparanLeaderboard(currentBatch, 'dashboard-leaderboard');

            let db = dapatkanPangkalanData();
            let sudahSelesai = db[currentPlayer].completed[currentBatch];
            let markahLama = db[currentPlayer].scores[currentBatch];

            if (sudahSelesai) {
                txt.innerHTML = `✅ Sesi Selesai!<br>Markah Terbaik Anda: <span style='color:var(--neon-blue)'>${markahLama} Mata</span>`;
                btn.innerText = "Ulang Jawab Batch Ini";
            } else {
                txt.innerHTML = `🎮 Status: Belum Selesai.<br>Sedia mengutip 1,000 mata penuh gembira!`;
                btn.innerText = "Mula Menjawab";
            }
            btn.disabled = false;
        }

        function startSelectedQuiz() {
            switchScreen('screen-quiz');
            document.getElementById('quiz-user-display').innerText = `PEMAIN: ${currentPlayer.toUpperCase()}`;
            document.getElementById('quiz-batch-display').innerText = `BATCH: ${currentBatch}`;

            let soalanAsasMula = ((parseInt(currentBatch) - 1) * 50) + 1;
            currentQuizIndex = soalanAsasMula;
            batchScoreTrack = 0;
            soalanSelesaiCount = 0;
            
            muatSoalanKeluarga();
        }

        function muatSoalanKeluarga() {
            switchScreen('screen-quiz');
            let dataQ = janaSoalanDinamik(currentQuizIndex);

            // Set Gaya Badge Tahap
            const b = document.getElementById('quiz-level-badge');
            b.innerText = dataQ.level;
            b.className = `badge-level b-${dataQ.level}`;

            // Set Progress Bar
            let peratus = (soalanSelesaiCount / 50) * 100;
            document.getElementById('quiz-progress-bar').style.width = `${peratus}%`;

            document.getElementById('quiz-question-text').innerText = dataQ.q;

            // Rawakkan pilihan jawapan supaya kedudukan 'A' berubah-ubah
            let susunanPilihan = dataQ.o.map((opt, idx) => ({ text: opt, asalIdx: idx }));
            susunanPilihan.sort(() => Math.random() - 0.5);

            const container = document.getElementById('quiz-options-container');
            container.innerHTML = "";

            susunanPilihan.forEach((opt, gridIdx) => {
                if (opt.asalIdx === 0) correctIndexAktif = gridIdx; // Jejak mana satu jawapan betul yang sebenar

                container.innerHTML += `
                    <button class="opt-btn" onclick="nilaiJawapanKlik(${gridIdx})">
                        <strong>${String.fromCharCode(65 + gridIdx)}.</strong> ${opt.text}
                    </button>
                `;
            });
        }

        function nilaiJawapanKlik(pilihanGridIdx) {
            let dataQ = janaSoalanDinamik(currentQuizIndex);
            let tepat = pilihanGridIdx === correctIndexAktif;
            const fBox = document.getElementById('feedback-alert');

            if (tepat) {
                batchScoreTrack += 20; // 20 Mata satu soalan (50 soalan = 1000 Mata Maksimum)
                fBox.className = "alert-box alert-correct";
                fBox.innerText = "🎉 JAWAPAN ANDA TEPAT (+20 MATA)!";
            } else {
                let hurufBetul = String.fromCharCode(65 + correctIndexAktif);
                fBox.className = "alert-box alert-wrong";
                fBox.innerText = `❌ JAWAPAN KURANG TEPAT! (Jawapan Betul: [ ${hurufBetul} ])`;
            }

            document.getElementById('feedback-explanation-text').innerText = dataQ.h;
            switchScreen('screen-feedback');
        }

        function loadNextQuestion() {
            soalanSelesaiCount++;
            currentQuizIndex++;

            let hadAtasBatch = (parseInt(currentBatch) * 50);

            if (currentQuizIndex > hadAtasBatch || soalanSelesaiCount >= 50) {
                tamatkanSesiBatchSelesai();
            } else {
                muatSoalanKeluarga();
            }
        }

        function tamatkanSesiBatchSelesai() {
            let db = dapatkanPangkalanData();
            db[currentPlayer].scores[currentBatch] = batchScoreTrack;
            db[currentPlayer].completed[currentBatch] = true;
            simpanKePangkalanData(db);

            document.getElementById('batch-end-message').innerText = `Hebat ${currentPlayer}! Selesai sudah 50 soalan untuk Batch ${currentBatch}. Markah terkumpul anda: ${batchScoreTrack} / 1000 Mata.`;
            
            binaPaparanLeaderboard(currentBatch, 'batch-end-leaderboard');
            switchScreen('screen-batch-end');
        }

        function binaPaparanLeaderboard(batchId, targetElementId) {
            let db = dapatkanPangkalanData();
            let senaraiRaking = [];

            Object.keys(db).forEach(nama => {
                senaraiRaking.push({
                    name: nama,
                    score: db[nama].scores[batchId] || 0,
                    selesai: db[nama].completed[batchId] || false
                });
            });

            senaraiRaking.sort((a, b) => b.score - a.score);

            const container = document.getElementById(targetElementId);
            container.innerHTML = "";

            senaraiRaking.forEach((item, index) => {
                let statusInfo = item.selesai ? `⭐ ${item.score} Mata` : `<span style="color:var(--text-muted); font-size:0.8rem; font-weight:500;">Belum Jawab</span>`;
                let gayaTop = (index === 0 && item.score > 0) ? "rank-row top" : "rank-row";

                container.innerHTML += `
                    <div class="${gayaTop}">
                        <span>#${index + 1} ${item.name}</span>
                        <span>${statusInfo}</span>
                    </div>
                `;
            });
        }

        function backToDashboard() {
            switchScreen('screen-dashboard');
            checkUserProgress();
        }

        function switchScreen(id) {
            ['screen-dashboard', 'screen-quiz', 'screen-feedback', 'screen-batch-end'].forEach(sid => {
                document.getElementById(sid).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        window.onload = function() {
            binaOpsyenBatch();
            binaPaparanLeaderboard("1", "dashboard-leaderboard");
        };
    </script>
</body>
</html>
