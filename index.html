        // ALGORITMA UTAMA ANTI-ULANG MUTLAK
        function janaSoalan500(noId) {
            // Rotational Offset Mapping menggunakan pusingan matematik berbeza bagi setiap index array
            let idxSubjek = (noId - 1) % 25;
            
            // Menggunakan pendaraban nombor perdana (7) dan anjakan mengikut blok id untuk tukar pasangan situasi
            let idxSituasi = ((noId - 1) * 7 + Math.floor((noId - 1) / 25)) % 25;
            
            // Set jawapan dipadankan mengikut situasi supaya logiknya sentiasa betul & tidak lari skop
            let idxPilihan = idxSituasi; 

            let tahap = "mudah";
            if (noId > 150 && noId <= 350) tahap = "sederhana";
            if (noId > 350) tahap = "sukar";
            
            let idxTema = (noId * 3) % dTema.length;

            return {
                id: noId, 
                level: tahap, 
                tema: dTema[idxTema],
                q: `[Kes #${noId}] ${dSubjek[idxSubjek]} ${dSituasi[idxSituasi]}`,
                o: [...dPilihanSet[idxPilihan].o], 
                h: dPilihanSet[idxPilihan].h
            };
        }

            updateGlobalStats();
        }
        function saveStorage() { localStorage.setItem("BrainGym500_AntiLoop_Premium", JSON.stringify(appState)); }
        function updateGlobalStats() {
            document.getElementById('stat-total-score').innerText = appState.totalScore;
            let doneCount = Object.values(appState.batchCompleted).filter(v => v !== -1).length;
            document.getElementById('stat-batches-done').innerText = `${doneCount}/20`;
        }

        function renderBatchGrid() {
            const container = document.getElementById('batch-buttons-container');
            container.innerHTML = "";
            for (let b = 1; b <= 20; b++) {
                let statusClass = appState.batchCompleted[b] !== -1 ? "completed" : "";
                container.innerHTML += `<button class="batch-btn ${statusClass}" onclick="selectBatch(${b})">${b}</button>`;
            }
        }

        function selectBatch(batchNum) {
            activeBatch = batchNum;
            let levelLabel = "MUDAH"; let levelClass = "b-mudah";
            if(batchNum > 6 && batchNum <= 14) { levelLabel = "SEDERHANA"; levelClass = "b-sederhana"; }
            if(batchNum > 14) { levelLabel = "SUKAR"; levelClass = "b-sukar"; }

            document.getElementById('selected-batch-title').innerText = `Sesi Kes: Batch ${batchNum}`;
            const lvlBadge = document.getElementById('selected-batch-level');
            lvlBadge.innerText = levelLabel; lvlBadge.className = `badge ${levelClass}`;

            let scoreLama = appState.batchCompleted[batchNum];
            document.getElementById('selected-batch-status').innerText = scoreLama !== -1 ? `Skor: ${scoreLama} Pts` : "Belum Mula";
            document.getElementById('btn-start-campaign').disabled = false;
        }

        function startSoloCampaign() {
            switchScreen('screen-gameplay');
            document.getElementById('game-batch-label').innerText = `BATCH SESSIONS: ${activeBatch}`;
            activeQuestionIndex = ((activeBatch - 1) * 25) + 1;
            activeBatchScore = 0; activeQuestionsAnswered = 0;
            loadNextSoloQuestion();
        }

        function loadNextSoloQuestion() {
            switchScreen('screen-gameplay');
            let qData = janaSoalan500(activeQuestionIndex);

            document.getElementById('game-progress-label').innerText = `SOALAN ${activeQuestionsAnswered + 1}/25`;
            document.getElementById('game-progress-bar').style.width = `${(activeQuestionsAnswered / 25) * 100}%`;

            const lvlB = document.getElementById('game-level-badge');
            lvlB.innerText = qData.level.toUpperCase(); lvlB.className = `badge b-${qData.level}`;
            document.getElementById('game-tema-badge').innerText = qData.tema;
            document.getElementById('game-question-text').innerText = qData.q;

            // Rawakkan paparan susunan butang pilihan A, B, C, D di skrin
            let susunanRawak = qData.o.map((t, idx) => ({ text: t, originalIdx: idx }));
            susunanRawak.sort(() => Math.random() - 0.5);

            const optContainer = document.getElementById('game-options-container');
            optContainer.innerHTML = "";

            susunanRawak.forEach((c, gridIdx) => {
                if (c.originalIdx === 0) correctAnswerGridIdx = gridIdx;
                optContainer.innerHTML += `
                    <button class="opt-btn" onclick="submitSoloAnswer(${gridIdx})">
                        <strong>${String.fromCharCode(65 + gridIdx)}.</strong> ${c.text}
                    </button>
                `;
            });
        }

        function submitSoloAnswer(selectedGridIdx) {
            let qData = janaSoalan500(activeQuestionIndex);
            let isCorrect = selectedGridIdx === correctAnswerGridIdx;
            const alertBox = document.getElementById('feedback-alert-box');

            if (isCorrect) {
                activeBatchScore += 40;
                alertBox.className = "alert alert-win"; alertBox.innerText = "🎯 JAWAPAN TEPAT (+40 MATA)";
            } else {
                let correctLetter = String.fromCharCode(65 + correctAnswerGridIdx);
                alertBox.className = "alert alert-lose"; alertBox.innerText = `⚠️ PILIHAN KURANG TEPAT (Jawapan: [ ${correctLetter} ])`;
            }

            document.getElementById('feedback-explanation-text').innerText = qData.h;
            switchScreen('screen-feedback');
        }

        function nextCampaignStep() {
            activeQuestionsAnswered++; activeQuestionIndex++;
            if (activeQuestionsAnswered >= 25) { concludeBatch(); } else { loadNextSoloQuestion(); }
        }

        function concludeBatch() {
            switchScreen('screen-summary');
            document.getElementById('summary-title').innerText = `Sesi ${activeBatch} Selesai!`;
            document.getElementById('summary-score-text').innerText = `Skor: ${activeBatchScore} / 1000 Mata`;

            let previousBest = appState.batchCompleted[activeBatch];
            if (activeBatchScore > previousBest) {
                let diff = previousBest === -1 ? activeBatchScore : activeBatchScore - previousBest;
                appState.totalScore += diff; appState.batchCompleted[activeBatch] = activeBatchScore; saveStorage();
            }

            let evalText = "Boleh tahan mantap logik harian korang. Teruskan mengasah otak dalam siri kempen yang lain!";
            if(activeBatchScore >= 800) evalText = "Padu! Pemikiran korang sangat street-smart, peka, dan memang faham realiti hidup.";
            
            document.getElementById('summary-evaluation').innerText = evalText;
            updateGlobalStats();
        }

        function exitToMainMenu() { switchScreen('screen-menu'); renderBatchGrid(); selectBatch(activeBatch); }

        function switchScreen(id) {
            ['screen-menu', 'screen-gameplay', 'screen-feedback', 'screen-summary'].forEach(sid => {
                document.getElementById(sid).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        window.onload = function() { loadStorage(); renderBatchGrid(); };
    </script>
</body>
</html>
